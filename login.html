<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in — Credible Review</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,340;9..144,380&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
  .login-page {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--paper-warm);
    padding: 24px;
  }
  .login-card {
    width: 100%;
    max-width: 420px;
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 40px;
    box-shadow: 0 8px 32px rgba(15, 17, 20, 0.08);
  }
  .login-card h1 {
    font-family: var(--font-display);
    font-size: 28px;
    font-weight: 340;
    margin-bottom: 8px;
  }
  .login-card p {
    color: var(--ink-mute);
    font-size: 15px;
    margin-bottom: 28px;
    line-height: 1.5;
  }
  .login-field {
    margin-bottom: 16px;
  }
  .login-field label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 6px;
    color: var(--ink-soft);
  }
  .login-field input {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid var(--line);
    border-radius: 8px;
    font-family: var(--font-body);
    font-size: 15px;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .login-field input:focus {
    outline: none;
    border-color: var(--blue);
    box-shadow: 0 0 0 3px rgba(42, 95, 168, 0.12);
  }
  .login-error {
    background: #FDF0ED;
    color: var(--coral);
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 13px;
    margin-bottom: 16px;
    display: none;
  }
  .login-error.show { display: block; }
  .login-submit {
    width: 100%;
    margin-top: 8px;
  }
  .login-note {
    margin-top: 20px;
    font-size: 12px;
    color: var(--ink-mute);
    text-align: center;
    line-height: 1.5;
  }
</style>
</head>
<body>

<div class="login-page">
  <div class="login-card">
    <p class="eyebrow eyebrow-gold mb-4">Team review</p>
    <h1>Sign in to review</h1>
    <p>Enter your name and email to access the site and leave feedback for the team.</p>

    <div class="login-error" id="login-error"></div>

    <form id="login-form">
      <div class="login-field">
        <label for="name">Your name</label>
        <input type="text" id="name" name="name" placeholder="Jane Smith" required autocomplete="name">
      </div>
      <div class="login-field">
        <label for="email">Email address</label>
        <input type="email" id="email" name="email" placeholder="jane@company.com" required autocomplete="email">
      </div>
      <button type="submit" class="btn btn-primary login-submit" id="login-btn">Continue to site</button>
    </form>

    <p class="login-note">Your email is used to identify comments and send notifications when you're @tagged.</p>
  </div>
</div>

<script>
(function () {
  const TOKEN_KEY = 'review_token';
  const USER_KEY = 'review_user';
  const params = new URLSearchParams(window.location.search);
  const redirect = params.get('redirect') || '/index.html';

  if (localStorage.getItem(TOKEN_KEY)) {
    window.location.replace(decodeURIComponent(redirect));
    return;
  }

  const form = document.getElementById('login-form');
  const errorEl = document.getElementById('login-error');
  const btn = document.getElementById('login-btn');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errorEl.classList.remove('show');
    btn.disabled = true;
    btn.textContent = 'Signing in…';

    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();

    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Sign in failed');

      localStorage.setItem(TOKEN_KEY, data.token);
      localStorage.setItem(USER_KEY, JSON.stringify(data.user));
      window.location.replace(decodeURIComponent(redirect));
    } catch (err) {
      errorEl.textContent = err.message;
      errorEl.classList.add('show');
      btn.disabled = false;
      btn.textContent = 'Continue to site';
    }
  });
})();
</script>

</body>
</html>
